basePath: /
definitions:
  admintype.CreateRoleMappingRequest:
    properties:
      departments:
        items:
          type: string
        type: array
      keyword:
        type: string
      name:
        type: string
      role:
        $ref: '#/definitions/model.Role'
    required:
    - keyword
    - name
    - role
    type: object
  admintype.KnowledgeSourceInput:
    properties:
      content:
        type: string
      title:
        type: string
    required:
    - content
    - title
    type: object
  admintype.SaveRoleOwnerRequest:
    properties:
      enabled:
        type: boolean
      feishuId:
        type: string
      feishuIdType:
        type: string
      ownerName:
        type: string
      role:
        $ref: '#/definitions/model.Role'
    required:
    - ownerName
    - role
    type: object
  admintype.SyncKnowledgeRequest:
    properties:
      sources:
        items:
          $ref: '#/definitions/admintype.KnowledgeSourceInput'
        type: array
    required:
    - sources
    type: object
  authtype.FeishuSSOLoginRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  model.AgentRunStatus:
    enum:
    - pending
    - running
    - succeeded
    - failed
    type: string
    x-enum-varnames:
    - AgentRunPending
    - AgentRunRunning
    - AgentRunSucceeded
    - AgentRunFailed
  model.ArtifactType:
    enum:
    - structured_requirement
    - solution_design
    - code_diff
    - test_report
    - review_report
    - delivery_summary
    type: string
    x-enum-varnames:
    - ArtifactStructuredRequirement
    - ArtifactSolutionDesign
    - ArtifactCodeDiff
    - ArtifactTestReport
    - ArtifactReviewReport
    - ArtifactDeliverySummary
  model.CheckpointStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - CheckpointPending
    - CheckpointApproved
    - CheckpointRejected
  model.CheckpointType:
    enum:
    - design_review
    - code_review
    type: string
    x-enum-varnames:
    - CheckpointDesignReview
    - CheckpointCodeReview
  model.GitDeliveryStatus:
    enum:
    - pending
    - draft
    - ready
    - completed
    - failed
    type: string
    x-enum-varnames:
    - GitDeliveryPending
    - GitDeliveryDraft
    - GitDeliveryReady
    - GitDeliveryCompleted
    - GitDeliveryFailed
  model.PipelineRunStatus:
    enum:
    - draft
    - queued
    - running
    - waiting_approval
    - paused
    - failed
    - completed
    - terminated
    type: string
    x-enum-varnames:
    - PipelineRunDraft
    - PipelineRunQueued
    - PipelineRunRunning
    - PipelineRunWaitingApproval
    - PipelineRunPaused
    - PipelineRunFailed
    - PipelineRunCompleted
    - PipelineRunTerminated
  model.Role:
    enum:
    - product
    - frontend
    - backend
    - other
    - admin
    type: string
    x-enum-varnames:
    - RoleProduct
    - RoleFrontend
    - RoleBackend
    - RoleOther
    - RoleAdmin
  model.StageRunStatus:
    enum:
    - pending
    - queued
    - running
    - waiting_approval
    - succeeded
    - failed
    - skipped
    type: string
    x-enum-varnames:
    - StageRunPending
    - StageRunQueued
    - StageRunRunning
    - StageRunWaitingApproval
    - StageRunSucceeded
    - StageRunFailed
    - StageRunSkipped
  model.StageType:
    enum:
    - analysis
    - design
    - checkpoint
    - codegen
    - test
    - review
    - delivery
    type: string
    x-enum-varnames:
    - StageTypeAnalysis
    - StageTypeDesign
    - StageTypeCheckpoint
    - StageTypeCodegen
    - StageTypeTest
    - StageTypeReview
    - StageTypeDelivery
  model.TaskStatus:
    enum:
    - todo
    - in_progress
    - testing
    - done
    type: string
    x-enum-varnames:
    - TaskTodo
    - TaskInProgress
    - TaskTesting
    - TaskDone
  pipelinetype.AgentRunResponse:
    properties:
      agentKey:
        type: string
      createdAt:
        type: string
      errorMessage:
        type: string
      id:
        type: string
      inputJson:
        type: string
      latencyMs:
        type: integer
      model:
        type: string
      outputJson:
        type: string
      pipelineRunId:
        type: string
      promptSnapshot:
        type: string
      provider:
        type: string
      stageRunId:
        type: string
      status:
        $ref: '#/definitions/model.AgentRunStatus'
      tokenUsageJson:
        type: string
      updatedAt:
        type: string
    type: object
  pipelinetype.ArtifactResponse:
    properties:
      artifactType:
        $ref: '#/definitions/model.ArtifactType'
      contentJson:
        type: string
      contentText:
        type: string
      createdAt:
        type: string
      filePath:
        type: string
      id:
        type: string
      metaJson:
        type: string
      pipelineRunId:
        type: string
      stageRunId:
        type: string
      title:
        type: string
    type: object
  pipelinetype.CheckpointEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.CheckpointResponse'
      error:
        type: string
    type: object
  pipelinetype.CheckpointResponse:
    properties:
      approverId:
        type: string
      checkpointType:
        $ref: '#/definitions/model.CheckpointType'
      comment:
        type: string
      createdAt:
        type: string
      decidedAt:
        type: string
      decision:
        type: string
      id:
        type: string
      pipelineRunId:
        type: string
      stageRunId:
        type: string
      status:
        $ref: '#/definitions/model.CheckpointStatus'
      updatedAt:
        type: string
    type: object
  pipelinetype.CreatePipelineRunFromSessionRequest:
    properties:
      sessionId:
        type: string
      targetBranch:
        type: string
      targetRepo:
        type: string
      templateId:
        type: string
    required:
    - sessionId
    type: object
  pipelinetype.CreatePipelineRunRequest:
    properties:
      requirementText:
        type: string
      targetBranch:
        type: string
      targetRepo:
        type: string
      templateId:
        type: string
      title:
        type: string
    required:
    - requirementText
    - title
    type: object
  pipelinetype.ErrorEnvelope:
    properties:
      error:
        type: string
    type: object
  pipelinetype.GitDeliveryEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.GitDeliveryResponse'
      error:
        type: string
    type: object
  pipelinetype.GitDeliveryResponse:
    properties:
      baseBranch:
        type: string
      changedFilesJson:
        type: string
      commitSha:
        type: string
      createdAt:
        type: string
      headBranch:
        type: string
      id:
        type: string
      pipelineRunId:
        type: string
      prmrBody:
        type: string
      prmrTitle:
        type: string
      prmrUrl:
        type: string
      provider:
        type: string
      repo:
        type: string
      status:
        $ref: '#/definitions/model.GitDeliveryStatus'
      summaryMarkdown:
        type: string
      updatedAt:
        type: string
      validationJson:
        type: string
    type: object
  pipelinetype.PipelineRunCurrentEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.PipelineRunCurrentResponse'
      error:
        type: string
    type: object
  pipelinetype.PipelineRunCurrentResponse:
    properties:
      agentRun:
        $ref: '#/definitions/pipelinetype.AgentRunResponse'
      artifact:
        $ref: '#/definitions/pipelinetype.ArtifactResponse'
      checkpoint:
        $ref: '#/definitions/pipelinetype.CheckpointResponse'
      delivery:
        $ref: '#/definitions/pipelinetype.GitDeliveryResponse'
      nextAction:
        type: string
      run:
        $ref: '#/definitions/pipelinetype.PipelineRunResponse'
      stage:
        $ref: '#/definitions/pipelinetype.StageRunResponse'
    type: object
  pipelinetype.PipelineRunDetailEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.PipelineRunDetailResponse'
      error:
        type: string
    type: object
  pipelinetype.PipelineRunDetailResponse:
    properties:
      artifacts:
        items:
          $ref: '#/definitions/pipelinetype.ArtifactResponse'
        type: array
      checkpoints:
        items:
          $ref: '#/definitions/pipelinetype.CheckpointResponse'
        type: array
      run:
        $ref: '#/definitions/pipelinetype.PipelineRunResponse'
      stages:
        items:
          $ref: '#/definitions/pipelinetype.StageRunResponse'
        type: array
    type: object
  pipelinetype.PipelineRunListEnvelope:
    properties:
      data:
        items:
          $ref: '#/definitions/pipelinetype.PipelineRunResponse'
        type: array
      error:
        type: string
    type: object
  pipelinetype.PipelineRunResponse:
    properties:
      createdAt:
        type: string
      createdBy:
        type: string
      currentStageKey:
        type: string
      finishedAt:
        type: string
      id:
        type: string
      requirementText:
        type: string
      sourceSessionId:
        type: string
      startedAt:
        type: string
      status:
        $ref: '#/definitions/model.PipelineRunStatus'
      targetBranch:
        type: string
      targetRepo:
        type: string
      templateId:
        type: string
      title:
        type: string
      updatedAt:
        type: string
      workBranch:
        type: string
    type: object
  pipelinetype.PipelineRunTimelineEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.PipelineRunTimelineResponse'
      error:
        type: string
    type: object
  pipelinetype.PipelineRunTimelineResponse:
    properties:
      agentRuns:
        items:
          $ref: '#/definitions/pipelinetype.AgentRunResponse'
        type: array
      artifacts:
        items:
          $ref: '#/definitions/pipelinetype.ArtifactResponse'
        type: array
      checkpoints:
        items:
          $ref: '#/definitions/pipelinetype.CheckpointResponse'
        type: array
      current:
        $ref: '#/definitions/pipelinetype.PipelineRunCurrentResponse'
      deliveries:
        items:
          $ref: '#/definitions/pipelinetype.GitDeliveryResponse'
        type: array
      run:
        $ref: '#/definitions/pipelinetype.PipelineRunResponse'
      stages:
        items:
          $ref: '#/definitions/pipelinetype.StageRunResponse'
        type: array
      summary:
        $ref: '#/definitions/pipelinetype.PipelineRunTimelineSummaryResponse'
    type: object
  pipelinetype.PipelineRunTimelineSummaryResponse:
    properties:
      completedStages:
        type: integer
      currentStageKey:
        type: string
      durationMs:
        type: integer
      failedStages:
        type: integer
      finishedAt:
        type: string
      latestArtifactId:
        type: string
      latestDeliveryId:
        type: string
      startedAt:
        type: string
      totalStages:
        type: integer
      waitingApproval:
        type: boolean
    type: object
  pipelinetype.PipelineTemplateListEnvelope:
    properties:
      data:
        items:
          $ref: '#/definitions/pipelinetype.PipelineTemplateResponse'
        type: array
      error:
        type: string
    type: object
  pipelinetype.PipelineTemplateResponse:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      name:
        type: string
      updatedAt:
        type: string
      version:
        type: string
    type: object
  pipelinetype.RunAgentRunListEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.RunAgentRunListResponse'
      error:
        type: string
    type: object
  pipelinetype.RunAgentRunListResponse:
    properties:
      agentRuns:
        items:
          $ref: '#/definitions/pipelinetype.AgentRunResponse'
        type: array
    type: object
  pipelinetype.RunArtifactListEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.RunArtifactListResponse'
      error:
        type: string
    type: object
  pipelinetype.RunArtifactListResponse:
    properties:
      artifacts:
        items:
          $ref: '#/definitions/pipelinetype.ArtifactResponse'
        type: array
    type: object
  pipelinetype.RunCheckpointListEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.RunCheckpointListResponse'
      error:
        type: string
    type: object
  pipelinetype.RunCheckpointListResponse:
    properties:
      checkpoints:
        items:
          $ref: '#/definitions/pipelinetype.CheckpointResponse'
        type: array
    type: object
  pipelinetype.RunGitDeliveryListEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.RunGitDeliveryListResponse'
      error:
        type: string
    type: object
  pipelinetype.RunGitDeliveryListResponse:
    properties:
      deliveries:
        items:
          $ref: '#/definitions/pipelinetype.GitDeliveryResponse'
        type: array
    type: object
  pipelinetype.RunStageListEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.RunStageListResponse'
      error:
        type: string
    type: object
  pipelinetype.RunStageListResponse:
    properties:
      stages:
        items:
          $ref: '#/definitions/pipelinetype.StageRunResponse'
        type: array
    type: object
  pipelinetype.RunStatusEnvelope:
    properties:
      data:
        $ref: '#/definitions/pipelinetype.RunStatusResponse'
      error:
        type: string
    type: object
  pipelinetype.RunStatusResponse:
    properties:
      currentStageKey:
        type: string
      finishedAt:
        type: string
      id:
        type: string
      startedAt:
        type: string
      status:
        $ref: '#/definitions/model.PipelineRunStatus'
      updatedAt:
        type: string
    type: object
  pipelinetype.StageRunResponse:
    properties:
      attempt:
        type: integer
      createdAt:
        type: string
      errorMessage:
        type: string
      finishedAt:
        type: string
      id:
        type: string
      inputJson:
        type: string
      outputJson:
        type: string
      pipelineRunId:
        type: string
      stageKey:
        type: string
      stageType:
        $ref: '#/definitions/model.StageType'
      startedAt:
        type: string
      status:
        $ref: '#/definitions/model.StageRunStatus'
      updatedAt:
        type: string
    type: object
  pipelinetype.UpdateCheckpointDecisionRequest:
    properties:
      comment:
        type: string
    type: object
  sessiontype.CreateMessageRequest:
    properties:
      content:
        type: string
    required:
    - content
    type: object
  sessiontype.CreateSessionRequest:
    properties:
      prompt:
        type: string
      title:
        type: string
    required:
    - prompt
    - title
    type: object
  tasktype.UpdateTaskStatusRequest:
    properties:
      status:
        $ref: '#/definitions/model.TaskStatus'
    required:
    - status
    type: object
info:
  contact: {}
  description: Feishu Pipeline 后端 API 文档。
  title: Feishu Pipeline API
  version: "1.0"
paths:
  /api/admin/knowledge/sync:
    post:
      consumes:
      - application/json
      parameters:
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/admintype.SyncKnowledgeRequest'
      produces:
      - application/json
      responses: {}
      summary: 同步知识库来源
      tags:
      - 后台管理
  /api/admin/role-mappings:
    post:
      consumes:
      - application/json
      parameters:
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/admintype.CreateRoleMappingRequest'
      produces:
      - application/json
      responses: {}
      summary: 创建或保存角色映射规则
      tags:
      - 后台管理
  /api/admin/role-owners:
    get:
      produces:
      - application/json
      responses: {}
      summary: 角色负责人列表
      tags:
      - 后台管理
    post:
      consumes:
      - application/json
      parameters:
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/admintype.SaveRoleOwnerRequest'
      produces:
      - application/json
      responses: {}
      summary: 保存角色负责人
      tags:
      - 后台管理
  /api/auth/feishu/config:
    get:
      produces:
      - application/json
      responses: {}
      summary: 获取飞书 SSO 前端配置
      tags:
      - 认证
  /api/auth/feishu/sso/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/authtype.FeishuSSOLoginRequest'
      produces:
      - application/json
      responses: {}
      summary: 飞书 SSO 登录
      tags:
      - 认证
  /api/auth/logout:
    post:
      produces:
      - application/json
      responses: {}
      summary: 登出
      tags:
      - 认证
  /api/checkpoints/{checkpointID}/approve:
    post:
      consumes:
      - application/json
      description: 对 pending 且绑定到 waiting_approval Run/Stage 的 checkpoint 做 approve
        决策。审批通过后 checkpoint stage 会标记 succeeded，PipelineRun 重新 queued 并继续后续阶段；重复审批会被拒绝。
      parameters:
      - description: 检查点ID
        in: path
        name: checkpointID
        required: true
        type: string
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/pipelinetype.UpdateCheckpointDecisionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.CheckpointEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 审批通过检查点
      tags:
      - Checkpoint
  /api/checkpoints/{checkpointID}/reject:
    post:
      consumes:
      - application/json
      description: 对 pending 且绑定到 waiting_approval Run/Stage 的 checkpoint 做 reject
        决策。驳回后会回退到上一可执行阶段，携带 reject comment 作为重做上下文，并将后续阶段与产物标记为待重跑/已 superseded。
      parameters:
      - description: 检查点ID
        in: path
        name: checkpointID
        required: true
        type: string
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/pipelinetype.UpdateCheckpointDecisionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.CheckpointEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 驳回检查点
      tags:
      - Checkpoint
  /api/git-deliveries/{deliveryID}:
    get:
      description: 按 deliveryID 查询 GitDelivery 详情，包含目标仓库、基础分支、工作分支、PR/MR 标题草稿、正文草稿、变更文件
        JSON、验证摘要和交付状态。该接口用于交付审查页展示。
      parameters:
      - description: 交付记录ID
        in: path
        name: deliveryID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.GitDeliveryEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取单个交付记录详情
      tags:
      - Pipeline
  /api/health:
    get:
      produces:
      - application/json
      responses: {}
      summary: 服务健康检查
      tags:
      - 健康检查
  /api/me:
    get:
      produces:
      - application/json
      responses: {}
      summary: 当前登录用户信息
      tags:
      - 认证
  /api/pipeline-runs:
    get:
      description: 按创建时间倒序返回 PipelineRun 列表。前端工作台可用该接口展示所有研发流水线运行记录、当前阶段、运行状态、目标仓库和工作分支。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.PipelineRunListEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线运行列表
      tags:
      - Pipeline
    post:
      consumes:
      - application/json
      description: 通过自然语言需求创建一个新的 PipelineRun。服务端会按模板事务化初始化 StageRun、Checkpoint 和初始
        Artifact，但不会自动开始执行；创建后需调用 start 接口进入队列。targetRepo 为空时默认 self，targetBranch
        为空时默认 main。
      parameters:
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/pipelinetype.CreatePipelineRunRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/pipelinetype.PipelineRunDetailEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 创建流水线运行
      tags:
      - Pipeline
  /api/pipeline-runs/{id}:
    get:
      description: 返回单个 PipelineRun 的基础详情，以及该运行下的 StageRun、Artifact 和 Checkpoint 列表。适合详情页初始化使用；若需要
        AgentRun、GitDelivery、当前动作提示，请使用 timeline/current 接口。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.PipelineRunDetailEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线运行详情
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/agent-runs:
    get:
      description: 返回指定 PipelineRun 的 AgentRun 列表。每条记录包含 AgentKey、Provider、Model、PromptSnapshot、输入输出、token
        usage 占位、耗时、状态和错误信息，用于审计真实 provider 调用、fallback 和阶段执行结果。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunAgentRunListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线 Agent 执行记录
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/artifacts:
    get:
      description: 返回指定 PipelineRun 的全部 Artifact。Artifact 是阶段间数据流转的核心载体，包含结构化需求、技术方案、代码变更计划、测试报告、评审报告和交付摘要等。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunArtifactListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线产物列表
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/checkpoints:
    get:
      description: 返回指定 PipelineRun 的人工检查点列表。当前默认模板包含方案审批和评审确认两个 Human-in-the-Loop
        节点，支持 approve/reject 决策。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunCheckpointListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线检查点列表
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/current:
    get:
      description: 返回当前 PipelineRun 的主操作上下文，包括当前阶段、当前产物、当前 checkpoint、当前 AgentRun、最新
        GitDelivery 和 nextAction。nextAction 可用于驱动前端主按钮和审批/交付面板。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.PipelineRunCurrentEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线当前阶段详情
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/deliveries:
    get:
      description: 返回指定 PipelineRun 的 GitDelivery 交付草稿列表。当前实现只创建本地可审查的交付记录和 PR/MR
        草稿，不执行 git push，也不创建远程 PR/MR。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunGitDeliveryListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线交付记录列表
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/pause:
    post:
      description: 将 queued 或 running 状态的 PipelineRun 暂停。暂停后后台执行器会停止继续推进后续阶段；已完成的阶段和产物不会被删除。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunStatusEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 暂停流水线运行
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/resume:
    post:
      description: 将 paused 或 failed 状态的 PipelineRun 重新置为 queued 并投递后台 runner。waiting_approval
        状态不能通过 resume 绕过审批，必须调用 checkpoint approve/reject。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunStatusEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 恢复流水线运行
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/stages:
    get:
      description: 返回指定 PipelineRun 的全部 StageRun，包含阶段 key、类型、状态、尝试次数、输入输出 JSON、错误信息和开始/结束时间。用于展示阶段流转和调试单个阶段状态。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunStageListEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线阶段列表
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/start:
    post:
      description: 将 draft 或 failed 状态的 PipelineRun 置为 queued 并投递后台 runner。执行器会顺序运行可执行阶段，遇到
        checkpoint 时自动进入 waiting_approval。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunStatusEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 启动流水线运行
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/terminate:
    post:
      description: 将未完成的 PipelineRun 标记为 terminated。terminated 和 completed 都是终态，不能再次
        start/resume；该接口不会删除已有产物、AgentRun 或交付记录。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.RunStatusEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 终止流水线运行
      tags:
      - Pipeline
  /api/pipeline-runs/{id}/timeline:
    get:
      description: 聚合返回 PipelineRun、所有 StageRun、Artifact、Checkpoint、AgentRun、GitDelivery、当前阶段和
        summary。summary 包含阶段统计、等待审批状态、最新产物、最新交付记录和耗时信息，是前端工作台的主数据接口。
      parameters:
      - description: 流水线运行ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.PipelineRunTimelineEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线工作台时间线
      tags:
      - Pipeline
  /api/pipeline-runs/from-session:
    post:
      consumes:
      - application/json
      description: 将已有需求会话中的消息和摘要汇总为 requirementText，并创建 PipelineRun。该接口用于把需求对话链路桥接到
        DevFlow Pipeline，不会自动启动执行。
      parameters:
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/pipelinetype.CreatePipelineRunFromSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/pipelinetype.PipelineRunDetailEnvelope'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 从会话创建流水线运行
      tags:
      - Pipeline
  /api/pipeline-templates:
    get:
      description: 返回当前系统可用的 PipelineTemplate。模板定义了赛题要求的研发流水线阶段、顺序和 checkpoint，用于创建
        PipelineRun 时初始化 StageRun、Checkpoint 和初始需求产物。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pipelinetype.PipelineTemplateListEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pipelinetype.ErrorEnvelope'
      summary: 获取流水线模板列表
      tags:
      - Pipeline
  /api/sessions:
    get:
      produces:
      - application/json
      responses: {}
      summary: 会话列表
      tags:
      - 会话
    post:
      consumes:
      - application/json
      parameters:
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/sessiontype.CreateSessionRequest'
      produces:
      - application/json
      responses: {}
      summary: 创建会话
      tags:
      - 会话
  /api/sessions/{sessionID}:
    get:
      parameters:
      - description: 会话ID
        in: path
        name: sessionID
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: 会话详情
      tags:
      - 会话
  /api/sessions/{sessionID}/messages:
    post:
      consumes:
      - application/json
      parameters:
      - description: 会话ID
        in: path
        name: sessionID
        required: true
        type: string
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/sessiontype.CreateMessageRequest'
      produces:
      - application/json
      responses: {}
      summary: 追加消息
      tags:
      - 会话
  /api/sessions/{sessionID}/messages/stream:
    post:
      consumes:
      - application/json
      parameters:
      - description: 会话ID
        in: path
        name: sessionID
        required: true
        type: string
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/sessiontype.CreateMessageRequest'
      produces:
      - text/event-stream
      responses: {}
      summary: 流式追加消息（SSE）
      tags:
      - 会话
  /api/sessions/{sessionID}/publish:
    post:
      parameters:
      - description: 会话ID
        in: path
        name: sessionID
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: 发布会话
      tags:
      - 会话
  /api/tasks/{taskID}:
    get:
      parameters:
      - description: 任务ID
        in: path
        name: taskID
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      summary: 任务详情
      tags:
      - 任务
  /api/tasks/{taskID}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: 任务ID
        in: path
        name: taskID
        required: true
        type: string
      - description: json入参
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/tasktype.UpdateTaskStatusRequest'
      produces:
      - application/json
      responses: {}
      summary: 更新任务状态
      tags:
      - 任务
swagger: "2.0"
